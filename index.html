<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>검진 전 탈의안내</title>
  
  <!-- SEO & Open Graph Metadata -->
  <meta name="description" content="검진 전 올바른 검진 가운 및 옷차림을 위한 탈의 안내 시스템입니다.">
  <meta property="og:title" content="검진 전 탈의안내">
  <meta property="og:description" content="검사 항목을 선택하시면 환복 안내 영상을 시청하실 수 있습니다.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="검진 전 탈의안내">
  <meta name="twitter:description" content="검사 항목을 선택하시면 환복 안내 영상을 시청하실 수 있습니다.">
  
  <!-- Google Fonts: Outfit (Accent) & Noto Sans KR (Korean) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Kiosk Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <!-- Main View Container -->
  <div class="kiosk-container">
    <main class="kiosk-viewport">
      
      <!-- Top Heading Section -->
      <div class="main-header-block">
        <h1 class="main-title">
          <svg class="megaphone-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.37 19.34L19.3 17.5c1.47-1.46 2.2-3.14 2.2-5.06s-.73-3.6-2.2-5.06l1.07-1.84c1.9 1.83 2.83 4.09 2.83 6.9s-.93 5.07-2.83 6.9zM16.5 15.66l-1.06-1.84c.67-.66 1-1.42 1-2.32s-.33-1.66-1-2.32L16.5 7.34c1.1 1.1 1.65 2.45 1.65 4.02s-.55 2.92-1.65 4.3zm-6.1-3.16H5.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5h4.9l4.5-4.5c.34-.34.9-.1 1.1.37v17.26c-.2.47-.76.71-1.1.37l-4.5-4.5z"/>
          </svg>
          검사 항목을 선택하시면 <span class="point-blue">안내 음성</span>이 나옵니다.
        </h1>
      </div>

      <!-- Missing Info Box (Critical) -->
      <div class="info-card-box">
        <h2 class="info-card-title">[ 여러 검사 동시 진행 시 선택 안내 ]</h2>
        <ul class="info-card-list">
          <li>• 대장내시경이 있다면? <span class="arrow-square"><i class="fa-solid fa-arrow-right"></i></span> <span class="point-blue-text">[C]</span> 선택</li>
          <li>• 대장내시경 없이 골밀도가 있다면? <span class="arrow-square"><i class="fa-solid fa-arrow-right"></i></span> <span class="point-blue-text">[B]</span> 선택</li>
          <li>• 위내시경이나 유방촬영이 있다면? <span class="arrow-square"><i class="fa-solid fa-arrow-right"></i></span> <span class="point-blue-text">[A]</span> 선택</li>
        </ul>
      </div>

      <!-- Three Main Card Buttons -->
      <div class="exam-types-row">
        <!-- Card A: Gastroscopy & Mammography -->
        <button class="exam-card-btn" data-type="A" data-video="https://photos.app.goo.gl/E8DPhqb9Q53KsaqWA">
          A. 위내시경·유방촬영
        </button>

        <!-- Card B: Bone Density Test -->
        <button class="exam-card-btn" data-type="B" data-video="C:/Users/user/Desktop/B타입.mp4">
          B. 골밀도 검사
        </button>

        <!-- Card C: Colonoscopy -->
        <button class="exam-card-btn" data-type="C" data-video="C:/Users/user/Desktop/C타입.mp4">
          C. 대장내시경
        </button>
      </div>

    </main>
  </div>

  <!-- Centered Popup Modal with 50% Dark Background Dimming -->
  <div id="video-modal" class="modal-overlay">
    <div class="modal-card">
      
      <!-- Modal Header -->
      <div class="modal-header">
        <h2 id="modal-title-text" class="modal-title">위내시경·유방촬영 안내</h2>
        <!-- Close (X) button inside the overlay -->
        <button id="btn-close-modal" class="btn-close" aria-label="닫기">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Video Body Section -->
      <div class="modal-body">
        <div class="video-wrapper">
          <!-- Video Tag: autoplay, muted, playsinline are strictly included -->
          <video id="kiosk-video" autoplay muted playsinline width="100%" height="100%">
            Your browser does not support the video tag.
          </video>

          <!-- Custom Video Control Overlays -->
          <div class="video-overlay-controls">
            <button id="btn-video-mute" class="video-control-btn mute-btn" aria-label="음소거 해제">
              <i id="mute-icon" class="fa-solid fa-volume-xmark"></i>
            </button>
            <button id="btn-video-replay" class="video-control-btn replay-btn" aria-label="다시 재생">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
          </div>

          <!-- High-Fidelity Connection/Error Fallback Overlay -->
          <div id="video-fallback" class="video-fallback-overlay active">
            <div class="spinner-loader"></div>
            <div class="fallback-status">
              <i class="fa-solid fa-circle-notch fa-spin status-icon"></i>
              <span class="status-msg">로컬 비디오 로드 중...</span>
            </div>
            <div class="fallback-details">
              <p class="fallback-url-label">로컬 파일 경로:</p>
              <code id="fallback-target-url" class="fallback-url-code">C:/Users/user/Desktop/A타입.mp4</code>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Modal Action Footer -->
      <div class="modal-action-footer">
        <button id="btn-modal-done" class="btn-modal-done">안내 확인 완료</button>
      </div>

    </div>
  </div>

  <!-- JavaScript App Logic -->
  <script src="js/app.js"></script>
</body>
</html>
