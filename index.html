<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>안내 키오스크</title>
  
  <!-- Google Fonts: Outfit (Accent) & Noto Sans KR (Korean) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Kiosk Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <!-- Main View Container -->
  <div class="kiosk-container">
    <main class="kiosk-viewport">
      
      <!-- Top Heading Section -->
      <div class="main-header-block">
        <h1 class="main-title">📢 검사 항목을 선택하시면 <span class="point-blue">안내 음성</span>이 나옵니다.</h1>
      </div>

      <!-- Missing Info Box (Critical) -->
      <div class="info-card-box">
        <h2 class="info-card-title">[ 여러 검사 동시 진행 시 선택 안내 ]</h2>
        <ul class="info-card-list">
          <li>• 대장내시경이 있다면? ➡️ <span class="point-blue-text">[C]</span> 선택</li>
          <li>• 대장내시경 없이 골밀도가 있다면? ➡️ <span class="point-blue-text">[B]</span> 선택</li>
          <li>• 위내시경이나 유방촬영이 있다면? ➡️ <span class="point-blue-text">[A]</span> 선택</li>
        </ul>
      </div>

      <!-- Three Main Card Buttons -->
      <div class="exam-types-row">
        <!-- Card A: Gastroscopy & Mammography -->
        <button class="exam-card-btn" data-type="A" data-video="https://r2.dev">
          A. 위내시경·유방촬영
        </button>

        <!-- Card B: Bone Density Test -->
        <button class="exam-card-btn" data-type="B" data-video="https://r2.dev">
          B. 골밀도 검사
        </button>

        <!-- Card C: Colonoscopy -->
        <button class="exam-card-btn" data-type="C" data-video="https://r2.dev">
          C. 대장내시경
        </button>
      </div>

    </main>
  </div>

  <!-- Centered Popup Modal with 50% Dark Background Dimming -->
  <div id="video-modal" class="modal-overlay">
    <div class="modal-card">
      
      <!-- Modal Header -->
      <div class="modal-header">
        <h2 id="modal-title-text" class="modal-title">위내시경·유방촬영 안내</h2>
        <!-- Close (X) button inside the overlay -->
        <button id="btn-close-modal" class="btn-close" aria-label="닫기">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Video Body Section -->
      <div class="modal-body">
        <div class="video-wrapper">
          <!-- Video Tag: autoplay, muted, playsinline are strictly included -->
          <video id="kiosk-video" autoplay muted playsinline width="100%" height="100%">
            Your browser does not support the video tag.
          </video>

          <!-- Custom Video Control Overlays -->
          <div class="video-overlay-controls">
            <button id="btn-video-mute" class="video-control-btn mute-btn" aria-label="음소거 해제">
              <i id="mute-icon" class="fa-solid fa-volume-xmark"></i>
            </button>
            <button id="btn-video-replay" class="video-control-btn replay-btn" aria-label="다시 재생">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
          </div>

          <!-- High-Fidelity Connection/Error Fallback Overlay -->
          <div id="video-fallback" class="video-fallback-overlay active">
            <div class="spinner-loader"></div>
            <div class="fallback-status">
              <i class="fa-solid fa-circle-exclamation status-icon"></i>
              <span class="status-msg">스트리밍 서버 연결 중...</span>
            </div>
            <div class="fallback-details">
              <p class="fallback-url-label">직접 연결 대상 URL:</p>
              <code id="fallback-target-url" class="fallback-url-code">https://r2.dev</code>
              <p class="fallback-note">본 시스템은 미디어 스트리밍이 차단되거나 유효하지 않은 형식의 경우에도 화면 정지 없이 복구 가이드를 제공합니다.</p>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Modal Action Footer -->
      <div class="modal-action-footer">
        <button id="btn-modal-done" class="btn-modal-done">안내 확인 완료</button>
      </div>

    </div>
  </div>

  <!-- JavaScript App Logic -->
  <script src="js/app.js"></script>
</body>
</html>
